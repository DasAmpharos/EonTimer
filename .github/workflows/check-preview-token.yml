name: Check Preview Deploy Token

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-token:
    runs-on: ubuntu-latest
    steps:
      - name: Check token expiration
        id: check
        env:
          TOKEN: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
        run: |
          response=$(curl -si \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/DasAmpharos/EonTimer-dev 2>&1)

          http_status=$(echo "$response" | grep -m1 "^HTTP/" | awk '{print $2}')

          if [ "$http_status" = "401" ] || [ "$http_status" = "403" ]; then
            echo "status=expired" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          expiry=$(echo "$response" \
            | grep -i "^github-authentication-token-expiration:" \
            | sed 's/^[^:]*: //' | tr -d '\r\n')

          if [ -z "$expiry" ]; then
            # No expiration header means the token has no set expiry
            echo "status=ok" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          expiry_ts=$(date -d "$expiry" +%s)
          now_ts=$(date +%s)
          days_left=$(( (expiry_ts - now_ts) / 86400 ))

          echo "days_left=$days_left" >> "$GITHUB_OUTPUT"
          echo "expiry=$expiry"       >> "$GITHUB_OUTPUT"

          if   [ "$days_left" -lt 0  ]; then echo "status=expired"       >> "$GITHUB_OUTPUT"
          elif [ "$days_left" -le 14 ]; then echo "status=expiring_soon" >> "$GITHUB_OUTPUT"
          else                               echo "status=ok"            >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update issue
        if: steps.check.outputs.status == 'expired' || steps.check.outputs.status == 'expiring_soon'
        uses: actions/github-script@v9
        with:
          script: |
            const status   = '${{ steps.check.outputs.status }}';
            const daysLeft = '${{ steps.check.outputs.days_left }}';
            const expiry   = '${{ steps.check.outputs.expiry }}';
            const marker   = '<!-- token-expiry-check -->';

            const title = status === 'expired'
              ? '🔴 PREVIEW_DEPLOY_TOKEN has expired'
              : `⚠️ PREVIEW_DEPLOY_TOKEN expires in ${daysLeft} day(s)`;

            const renewSteps = [
              '1. Go to https://github.com/settings/personal-access-tokens/new',
              '2. Repository access → `EonTimer-dev` only',
              '3. Permissions → **Contents: Read and write**',
              '4. Run: `gh secret set PREVIEW_DEPLOY_TOKEN --repo DasAmpharos/EonTimer`',
            ].join('\n');

            const body = status === 'expired'
              ? `${marker}\n@DasAmpharos — the \`PREVIEW_DEPLOY_TOKEN\` used for PR preview deployments has **expired**. PR previews will fail until it is renewed.\n\n${renewSteps}`
              : `${marker}\n@DasAmpharos — the \`PREVIEW_DEPLOY_TOKEN\` used for PR preview deployments expires on **${expiry}** (${daysLeft} day(s) remaining).\n\n${renewSteps}`;

            // Check for an existing open issue to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'token-expiry',
            });

            if (existing.length > 0) {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: existing[0].number,
                title,
                body,
              });
              console.log(`Updated existing issue #${existing[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body,
                labels: ['token-expiry'],
              });
              console.log(`Created issue #${issue.number}`);
            }

      - name: Close resolved issue
        if: steps.check.outputs.status == 'ok'
        uses: actions/github-script@v9
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: 'token-expiry',
            });
            for (const issue of existing) {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state:        'closed',
              });
              console.log(`Closed resolved issue #${issue.number}`);
            }
