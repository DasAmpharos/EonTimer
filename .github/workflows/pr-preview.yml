name: PR Preview

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npx tsc -b
      - run: npx vite build --base=/EonTimer-dev/pr-${{ github.event.pull_request.number }}/
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Deploy to EonTimer-dev
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
          repository-name: DasAmpharos/EonTimer-dev
          branch: gh-pages
          folder: dist
          target-folder: pr-${{ github.event.pull_request.number }}
          clean: true  # clean only this PR's subdirectory, not others

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://dasampharos.github.io/EonTimer-dev/pr-${prNumber}/`;
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n## 🚀 Preview deployment\n\n**${url}**\n\nUpdated on every push to this PR.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DasAmpharos/EonTimer-dev
          ref: gh-pages
          token: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}

      - name: Remove PR preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -rf pr-${{ github.event.pull_request.number }} --ignore-unmatch
          if git diff --staged --quiet; then
            echo "Nothing to remove"
          else
            git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          fi
