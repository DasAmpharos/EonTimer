name: PR Preview

on:
  workflow_run:
    workflows: ["PR Build"]
    types: [completed]
  pull_request_target:
    branches: [main]
    types: [closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pr-preview
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: dist/

      - name: Read PR number
        id: pr
        run: echo "number=$(cat dist/.pr-number)" >> $GITHUB_OUTPUT

      - name: Deploy to EonTimer-dev
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
          repository-name: DasAmpharos/EonTimer-dev
          branch: gh-pages
          folder: dist
          target-folder: pr-${{ steps.pr.outputs.number }}
          clean: true

      - name: Post preview URL comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(fs.readFileSync('dist/.pr-number', 'utf8').trim());
            const url = `https://dasampharos.github.io/EonTimer-dev/pr-${prNumber}/`;
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n## 🚀 Preview deployment\n\n**${url}**\n\nUpdated on every push to this PR.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: DasAmpharos/EonTimer-dev
          ref: gh-pages
          token: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}

      - name: Remove PR preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -rf pr-${{ github.event.pull_request.number }} --ignore-unmatch
          if git diff --staged --quiet; then
            echo "Nothing to remove"
          else
            git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          fi
