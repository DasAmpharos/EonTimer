name: CodeQL

on:
  push:
    branches: [3.x-python]
  pull_request:
    branches: [3.x-python]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
