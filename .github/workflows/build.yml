name: Build

on:
  push:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os:
          - macos
          - ubuntu
          - windows
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python (macOS universal2)
        if: matrix.os == 'macos'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Force uv to use system Python (macOS)
        if: matrix.os == 'macos'
        run: echo "UV_PYTHON_PREFERENCE=only-system" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu'
        run: sudo apt update && sudo apt install -y libegl1-mesa-dev

      - name: Install Dependencies
        run: uv sync --group build

      - name: Rebuild native extensions for universal2 (macOS)
        if: matrix.os == 'macos'
        run: |
          ARCHFLAGS="-arch x86_64 -arch arm64" uv pip install --reinstall --no-binary libsass,charset-normalizer libsass charset-normalizer

      - name: Inject Properties
        shell: bash
        run: |
          version="${{ github.ref_name }}@${GITHUB_SHA:0:7}"
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            version="${{ github.ref_name }}"
          fi

          properties_file="eon_timer/properties.json"
          cat <<EOF > "${properties_file}"
          {
            "version": "${version}",
            "build": "${{ github.run_number }}",
            "commit": "${GITHUB_SHA:0:7}"
          }
          EOF

      - name: Unit Tests
        run: uv run python -m unittest discover -v -s test -p "*_test.py"

      - name: Build Bundled Themes
        run: uv run python theme.py build --bundled

      - name: Build
        run: uv run pyinstaller EonTimer.spec

      - name: Clean up disk space (macOS)
        if: matrix.os == 'macos'
        run: |
          rm -rf build/
          uv cache clean

      - name: Get Artifact Name
        id: artifact
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos" ]]; then
            hdiutil create -format UDZO -srcfolder dist/EonTimer.app dist/EonTimer.dmg
            echo "artifact_name=EonTimer.dmg" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.os }}" == "windows" ]]; then
            echo "artifact_name=EonTimer.exe" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.os }}" == "ubuntu" ]]; then
            echo "artifact_name=EonTimer" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EonTimer-${{ matrix.os }}
          path: dist/${{ steps.artifact.outputs.artifact_name }}

      - name: Create Release Artifact
        if: startsWith(github.ref, 'refs/tags/')
        id: release-artifact
        shell: bash
        run: |
          release_artifact="EonTimer-${{ matrix.os }}.zip"
          echo "artifact_name=${release_artifact}" >> "$GITHUB_OUTPUT"
          uv run python3 bin/create-release-artifact.py -d dist -o EonTimer-${{ matrix.os }}.zip ${{ steps.artifact.outputs.artifact_name }}

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ steps.release-artifact.outputs.artifact_name }}

