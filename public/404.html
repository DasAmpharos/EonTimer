<!doctype html>
<script>
  // GitHub Pages SPA routing redirect.
  // Any path served as a 404 is redirected to the app root,
  // preserving the original query string and hash.
  var l = window.location;
  var segmentsToKeep = 1; // keep the /EonTimer base segment
  l.replace(
    l.protocol +
      '//' +
      l.hostname +
      (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') +
      '/' +
      (l.search || '') +
      (l.hash || ''),
  );
</script>
